name: Build ACE-Step Docker

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Login Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}

    - name: Build image
      run: |
        docker build \
        --build-arg HF_TOKEN=${{ secrets.HF_TOKEN }} \
        -t ${{ secrets.DOCKER_USERNAME }}/acestep-runpod:latest .

    - name: Push image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/acestep-runpod:latest
